<ng-container *ngIf="showNav$ | async">
  <header class="app-header">
    <div class="app-header-inner">

      <a class="brand" routerLink="/procesos">
        <div class="brand-icon">PF</div>
        <span class="brand-name">ProcessFlow</span>
      </a>

      <nav class="app-nav">
        <a routerLink="/procesos" routerLinkActive="nav-active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          Procesos
        </a>
        <a routerLink="/empresas" routerLinkActive="nav-active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
          Empresas
        </a>
      </nav>

      <div class="header-right">
        <div class="user-chip">
          <div class="user-avatar">L</div>
          <span class="user-label">Luis Buema</span>
        </div>
        <button
          class="theme-toggle"
          type="button"
          (click)="toggleTheme()"
          [title]="theme === 'dark' ? 'Cambiar a claro' : 'Cambiar a oscuro'"
        >
          <span>{{ theme === 'dark' ? '☀️' : '🌙' }}</span>
        </button>
        <button class="nav-logout" (click)="logout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </div>

    </div>
  </header>
</ng-container>

<div class="theme-curtain" id="app-curtain"></div>

<app-toast></app-toast>

<router-outlet></router-outlet>
