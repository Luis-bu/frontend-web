<div class="login-fullscreen">
  <!-- Left Side - Login Form -->
  <div class="login-left">
    <!-- Decorative dots -->
    <div class="absolute-decoration top-decoration">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="4" cy="4" r="2" fill="#FFD700" />
        <circle cx="16" cy="4" r="2" fill="#FFD700" />
        <circle cx="28" cy="4" r="2" fill="#FFD700" />
        <circle cx="40" cy="4" r="2" fill="#FFD700" />
        <circle cx="4" cy="16" r="2" fill="#FFD700" />
        <circle cx="16" cy="16" r="2" fill="#FFD700" />
        <circle cx="28" cy="16" r="2" fill="#FFD700" />
        <circle cx="40" cy="16" r="2" fill="#FFD700" />
        <circle cx="4" cy="28" r="2" fill="#FFD700" />
        <circle cx="16" cy="28" r="2" fill="#FFD700" />
        <circle cx="28" cy="28" r="2" fill="#FFD700" />
        <circle cx="40" cy="28" r="2" fill="#FFD700" />
      </svg>
    </div>

    <!-- Diagonal lines -->
    <svg class="diagonal-lines" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="0" x2="80" y2="200" stroke="#FFD700" stroke-width="2" />
      <line x1="60" y1="0" x2="120" y2="200" stroke="#FFD700" stroke-width="1" />
      <line x1="100" y1="0" x2="160" y2="200" stroke="#FFD700" stroke-width="2" />
    </svg>

    <div class="login-form-container">
      <!-- Headline -->
      <div class="headline">
        <h1 class="main-title">
          <span class="gold-text">Gestiona procesos</span><br/>con claridad
        </h1>
        <p class="subtitle">
          Organiza estudiantes, procesos y seguimiento académico desde un solo lugar
        </p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onLogin()" class="login-form">
        <!-- Email Input -->
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            type="email"
            placeholder="tu@email.com"
            [(ngModel)]="email"
            [ngModelOptions]="{ updateOn: 'change' }"
            name="email"
            class="form-input"
            required
          />
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••••"
            [(ngModel)]="password"
            [ngModelOptions]="{ updateOn: 'change' }"
            name="password"
            class="form-input"
            required
          />
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()" class="error-message">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage() }}
        </div>

        <!-- Remember & Forgot -->
        <div class="remember-forgot">
          <label class="remember-checkbox">
            <div class="checkbox-box"></div>
            <span>Recordarme</span>
          </label>
          <button type="button" class="forgot-link">¿Olvidaste tu contraseña?</button>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="signin-button" [disabled]="isLoading()">
          <span *ngIf="!isLoading()">Iniciar sesión</span>
          <span *ngIf="isLoading()" class="loading-text">Cargando...</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">O continúa con</span>
      </div>

      <!-- Google Sign In -->
      <button type="button" class="google-button">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>
  </div>

  <!-- Right Side - Abstract Geometric Design -->
  <div class="login-right">
    <!-- Large circle outline -->
    <div class="geometric-shape large-circle"></div>

    <!-- Medium circle -->
    <div class="geometric-shape medium-circle"></div>

    <!-- 3D Cube wireframe -->
    <svg class="cube-wireframe" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.3">
        <!-- Front face -->
        <polygon points="50,80 150,80 150,180 50,180" />
        <!-- Back face -->
        <polygon points="80,50 180,50 180,150 80,150" />
        <!-- Connecting lines -->
        <line x1="50" y1="80" x2="80" y2="50" />
        <line x1="150" y1="80" x2="180" y2="50" />
        <line x1="150" y1="180" x2="180" y2="150" />
        <line x1="50" y1="180" x2="80" y2="150" />
      </g>
    </svg>

    <!-- Small accent circles -->
    <div class="accent-dot accent-1"></div>
    <div class="accent-dot accent-2"></div>
    <div class="accent-dot accent-3"></div>

    <!-- Dot pattern - top right -->
    <div class="dot-pattern top-right-dots">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="5" cy="5" r="2" fill="#FFD700" />
        <circle cx="20" cy="5" r="2" fill="#FFD700" />
        <circle cx="35" cy="5" r="2" fill="#FFD700" />
        <circle cx="50" cy="5" r="2" fill="#FFD700" />
        <circle cx="5" cy="20" r="2" fill="#FFD700" />
        <circle cx="20" cy="20" r="2" fill="#FFD700" />
        <circle cx="35" cy="20" r="2" fill="#FFD700" />
        <circle cx="50" cy="20" r="2" fill="#FFD700" />
        <circle cx="5" cy="35" r="2" fill="#FFD700" />
        <circle cx="20" cy="35" r="2" fill="#FFD700" />
        <circle cx="35" cy="35" r="2" fill="#FFD700" />
        <circle cx="50" cy="35" r="2" fill="#FFD700" />
      </svg>
    </div>

    <!-- Diagonal accent lines -->
    <svg class="diagonal-accent" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="400" x2="200" y2="500" stroke="#FFD700" stroke-width="2" />
      <line x1="50" y1="400" x2="250" y2="500" stroke="#FFD700" stroke-width="1" />
      <line x1="100" y1="400" x2="300" y2="500" stroke="#FFD700" stroke-width="2" />
    </svg>

    <!-- Gradient overlay for depth -->
    <div class="gradient-overlay"></div>
  </div>
</div>
